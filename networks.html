<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environnement de Demain - Nos Réseaux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="networks.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header-reseaux">
        <div class="header-content">
            <div class="logo-box">
                <a href="index.html">
                    <img src="LogoPrincipal.png" alt="Logo" class="img-logo" loading="eager">
                </a>
            </div>

            <h1 class="main-title">Nos réseaux</h1>

            <div class="icons-box">
                <a href="contact.html"><img src="Logolocalisation.png" alt="Localisation" class="icon-top" loading="lazy"></a>
                <a href="tel:+33787142862"><img src="logotelcontact.png" alt="Téléphone" class="icon-top" loading="lazy"></a>
            </div>
        </div>
    </header>

    <main class="networks-section">
        
        <div class="networks-grid">
            
            <div class="network-card">
                <div class="floating-icon">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <div class="card-image-box">
                    <div class="coming-soon-banner">En préparation</div>
                    <img src="ImageInstagram.jpg" alt="Capture Instagram" class="screenshot-img" loading="lazy">
                </div>
                <a href="#" class="network-btn">Notre instagram</a>
            </div>

            <div class="network-card">
                <div class="floating-icon">
                    <i class="fa-brands fa-facebook-f"></i>
                </div>
                <div class="card-image-box">
                    <div class="coming-soon-banner">En préparation</div>
                    <img src="ImageFacebook.jpg" alt="Capture Facebook" class="screenshot-img" loading="lazy">
                </div>
                <a href="#" class="network-btn">Notre Facebook</a>
            </div>

            <div class="network-card">
                <div class="floating-icon">
                    <i class="fa-brands fa-twitter"></i>
                </div>
                <div class="card-image-box">
                    <div class="coming-soon-banner">En préparation</div>
                    <img src="imagetwitter.jpg" alt="Capture Twitter" class="screenshot-img" loading="lazy">
                </div>
                <a href="#" class="network-btn">Notre Twitter</a>
            </div>

        </div>

    </main>

</body>
</html>
